#docker compose up -d
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    restart: unless-stopped
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - app_net

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - app_net

  milvus:
    image: milvusdb/milvus:v2.4.4
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s
    networks:
      - app_net

  neo4j:
    image: neo4j:5.15-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/12345678
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - app_net

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5001"
      - "8090:8090"
    environment:
      MCP_PORT: "8090"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      MILVUS_URI: http://milvus:19530
      MILVUS_DB_PREFIX: graphrag
      MILVUS_GRAPH_PREFIX: graph
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "12345678"
      GRAPHRAG_ENABLED: "1"
      GRAPHRAG_TOP_K: "8"
      GRAPHRAG_GRAPH_HOPS: "2"
      GRAPHRAG_EXTRACT_MAX_CHUNKS: "16"
      GRAPHRAG_EXTRACT_BATCH_SIZE: "3"
      GRAPHRAG_EXTRACT_BATCH_DELAY_SEC: "0"
      API_REQUEST_INTERVAL_SEC: "0"
      API_RETRY_MAX: "5"
      API_RETRY_BASE_SEC: "2.0"
      DEFAULT_RAG_MODE: rag
      RAG_EMBED_BATCH_SIZE: "8"
      RAG_EMBED_BATCH_DELAY_SEC: "0"
      RAG_EMBEDDING_MODEL: embedding-3
      RAG_EMBEDDING_DIM: "1024"
      # 只写变量名，Docker 会自动从 .env 文件读取值
      ZHIPUAI_API_KEY: ${ZHIPUAI_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    volumes:
      - exports_data:/app/exports
      - uploads_data:/app/uploads
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  neo4j_data:
  exports_data:
  uploads_data:
